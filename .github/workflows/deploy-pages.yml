name: Build and deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Configure app URL and app name
        run: |
          if [ -n "${{ vars.APP_URL }}" ]; then
            echo "APP_URL=${{ vars.APP_URL }}" >> "$GITHUB_ENV"
          elif [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}" ]; then
            echo "APP_URL=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_ENV"
          else
            echo "APP_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ vars.APP_NAME }}" ]; then
            echo "APP_NAME=${{ vars.APP_NAME }}" >> "$GITHUB_ENV"
          else
            echo "APP_NAME=${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi

          echo "APP_ENV=production" >> "$GITHUB_ENV"

      - name: Install PHP dependencies
        run: composer install --no-ansi --no-interaction --no-progress --prefer-dist --no-dev --optimize-autoloader

      - name: Prepare environment
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate app key
        run: php please key:generate

      - name: Generate static site
        run: php please ssg:generate

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storage/app/static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
