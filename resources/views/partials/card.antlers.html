<div class="card card-{{ $blueprint }} {{ current_template === 'default' ? 'card-single' : 'card-archive' }}">
    <div class="card-meta">
        <a class="type" href="{{$ route('posts.type', $blueprint) $}}">
            {{ $blueprint | ucfirst }}
        </a>
        <a href="{{ url }}">Permalink</a>
        <span>{{ date format="M j Y" }}</span>
    </div>
    <div class="card-content">
        <div class="content">
            {{ partial:if_exists src="post_types/{blueprint}" }}
        </div>
        <div class="caption">
            {{ partial:caption }}
        </div>
    </div>
</div>
